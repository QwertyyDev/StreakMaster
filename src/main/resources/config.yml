
# StreakMaster - Premium Killstreak Plugin

# Killstreak sisteminin aktif olması için sunucuda bulunması gereken minimum oyuncu sayısı
minimum-players: 3

# Aktif killstreak'i olan bir oyuncu çıkış yaptığında streak'i sıfırlansın mı?
reset-on-quit: false

# ====================================
# ANTI-FARM SİSTEMİ (Gelişmiş Koruma)
# ====================================
anti-farm:
  # Aynı IP'den öldürme koruması
  same-ip:
    enabled: true
    # Aynı IP'den öldürme durumunda konsola log yazılsın mı?
    log: true
  
  # Aynı oyuncuyu tekrar öldürme koruması
  same-player:
    enabled: true
    # Aynı oyuncuyu tekrar öldürmeden önce kaç farklı oyuncu öldürmeli?
    required-different-kills: 1
    # Log yazılsın mı?
    log: true
  
  # Gelişmiş desen algılama sistemi
  pattern-detection:
    # Ana açma/kapama
    enabled: true
    
    # İki oyuncu birbirini dönüşümlü öldürme algılama (A->B->A->B)
    alternating-kills:
      enabled: true
      # Kaç dönüşümlü öldürme tespit edilirse engellensin?
      threshold: 3
      # Kontrol edilecek zaman aralığı (saniye)
      time-window: 300
    
    # Küçük oyuncu havuzu algılama (aynı 3-4 kişi sürekli)
    small-pool:
      enabled: true
      # Son kaç öldürmeye bakılacak?
      check-last-kills: 10
      # Bu öldürmeler içinde kaç benzersiz oyuncu olmalı? (daha azsa farm)
      minimum-unique-players: 5
    
    # Hızlı tekrarlı öldürme algılama
    rapid-repeated:
      enabled: true
      # Aynı oyuncuyu kaç saniye içinde tekrar öldürürse şüpheli sayılsın?
      time-threshold: 60
      # Bu kaç kez olursa engellensin?
      repeat-count: 3
    
    # Tespit edildiğinde ne yapılsın?
    action:
      # Streak kazanımı bloklanır
      block-streak-gain: true
      # Konsola log yazılır
      log: true
      # Yöneticilere bildirim gönderilir (streakmaster.admin yetkisine)
      notify-admins: true

