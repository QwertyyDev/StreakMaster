# ====================================
# INTERVAL ÖDÜL SİSTEMİ (Aralık Bazlı)
# ====================================
interval-rewards:
  # 5-50 arası her 5'te bir
  "5-50":
    interval: 5
    commands:
      - "eco give {player} 100"
  
  # 51-100 arası her 10'da bir
  "51-100":
    interval: 10
    commands:
      - "eco give {player} 500"
  
  # 101-200 arası her 25'te bir
  "101-200":
    interval: 25
    commands:
      - "eco give {player} 1000"
      - "give {player} diamond_block 1"

# ====================================
# MESAJLAR (Prefix YOK - Premium Stil)
# ====================================
messages:
  # Oyuncuya gönderilen özel mesajlar
  kill:
    # Her öldürmede gönderilen mesaj
    message: "&6⚔ &fKillstreak: &e{streak} &7(Rekor: &6{record}&7)"
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 0.5
    pitch: 1.5
  
  death:
    # Öldüğünde gönderilen mesaj
    message: "&c☠ &7Öldün! Streak sıfırlandı. &7(En yüksek: &6{record}&7)"
    sound: "ENTITY_VILLAGER_NO"
    volume: 0.5
    pitch: 0.8
  
  ended:
    # Birinin streak'i sona erdiğinde (broadcast)
    message: "&e{killer} &7oyuncusunun &c{streak} &7killstreak'i &e{victim} &7tarafından sonlandırıldı!"
    broadcast: true
    sound: "ENTITY_LIGHTNING_BOLT_IMPACT"
    volume: 0.3
    pitch: 1.2
  
  # Komut mesajları
  command:
    no-permission: "&cBu komutu kullanma yetkiniz yok!"
    player-not-found: "&cOyuncu bulunamadı!"
    invalid-amount: "&cGeçersiz sayı!"
    streak-added: "&a{player} oyuncusuna {amount} streak eklendi!"
    streak-removed: "&a{player} oyuncusundan {amount} streak kaldırıldı!"
    streak-set: "&a{player} oyuncusunun streak'i {amount} olarak ayarlandı!"
    streak-reset: "&a{player} oyuncusunun streak'i sıfırlandı!"
    record-added: "&a{player} oyuncusunun rekoruna {amount} eklendi!"
    record-removed: "&a{player} oyuncusunun rekorundan {amount} kaldırıldı!"
    reload-success: "&aKonfigürasyon başarıyla yenilendi!"
    usage: "&cKullanım: /streak <add|remove|set|reset|addrecord|removerecord|reload> [args]"
  
  # Anti-farm bildirimleri
  anti-farm:
    same-ip: "&c[Anti-Farm] &e{player} &7aynı IP'den öldürme yaptı!"
    same-player: "&c[Anti-Farm] &e{player} &7aynı oyuncuyu tekrar öldürdü!"
    pattern-detected: "&c[Anti-Farm] &e{player} &7farm pattern tespit edildi: &f{pattern}"

# ====================================
# SES AYARLARI (Global)
# ====================================
sounds:
  # Tüm sunucuya ses çalsın mı? (milestone broadcast için)
  global-milestone-sounds: true